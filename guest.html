<script>
// events.json を読み込みゲスト（公表用イベント）情報を動的に描画
document.addEventListener('DOMContentLoaded', async function() {
    var container = document.getElementById('events-container');
    if (!container) return;

    try {
        var res = await fetch('js/events.json');
        if (!res.ok) throw new Error('events.json の読み込みに失敗');
        var events = await res.json();

        var html = '';
        events.forEach(function(ev) {
            var descLines = ev.description ? ev.description.replace(/\n/g, '<br>') : '';
            var warningLines = ev.warningText ? ev.warningText.replace(/\n/g, '<br>') : '';
            var closingText = ev.closingText || '';

            html += '<p class="c">';
            html += '<strong>' + ev.displayDatetime + '</strong><br>';
            html += descLines;
            html += '</p>';

            if (ev.poster) {
                html += '<div class="poster" style="max-width: 600px; margin: 2rem auto;">';
                html += '<img src="' + ev.poster + '" alt="' + ev.title + ' ポスター">';
                html += '</div>';
            }

            if (ev.cautions && ev.cautions.length > 0) {
                html += '<h3>注意事項</h3>';
                html += '<p>企画会場でのマナーに関して会場施設を傷つける行為や、一般の方、近隣にお住まいの方のご迷惑となる行為は絶対におやめください。</p>';
                html += '<ul>';
                ev.cautions.forEach(function(c) { html += '<li>' + c + '</li>'; });
                html += '</ul>';
            }

            if (ev.otherNotes && ev.otherNotes.length > 0) {
                html += '<h3>その他注意事項</h3>';
                html += '<ul>';
                ev.otherNotes.forEach(function(n) { html += '<li>' + n + '</li>'; });
                html += '</ul>';
            }

            if (warningLines) html += '<p>' + warningLines + '</p>';
            if (closingText) html += '<p class="c" style="margin-top: 2rem;"><strong>' + closingText + '</strong></p>';
        });

        container.innerHTML = html;
    } catch (error) {
        console.error(error);
        container.innerHTML = '<p>情報の読み込み中にエラーが発生しました。</p>';
    }
});
</script>
